<svg width="620" height="180" viewBox="0 0 620 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .gv-main { font-family: 'Georgia', 'Times New Roman', serif; font-size: 48px; font-weight: 700; letter-spacing: 5px; }
      .gv-sub  { font-family: 'Georgia', 'Times New Roman', serif; font-size: 11.5px; font-weight: 400; letter-spacing: 5px; fill: #8A7AA8; }
    </style>
  </defs>

  <!-- Outer dashed orbit -->
  <circle cx="90" cy="90" r="78" fill="none" stroke="#DDD0EE" stroke-width="1" stroke-dasharray="4 6"/>
  <!-- Inner gold orbit -->
  <circle cx="90" cy="90" r="56" fill="none" stroke="#C8973A" stroke-width="0.8" opacity="0.45"/>
  <!-- Core circle -->
  <circle cx="90" cy="90" r="40" fill="#2A0F52"/>

  <!-- Sacred geometry: two triangles -->
  <polygon points="90,60 114,103 66,103" fill="none" stroke="#C8973A" stroke-width="1.2"/>
  <polygon points="90,120 114,77  66,77"  fill="none" stroke="#C8973A" stroke-width="1.2"/>

  <!-- Center dot -->
  <circle cx="90" cy="90" r="4" fill="#C8973A"/>

  <!-- Orbital planet dots -->
  <circle cx="90"  cy="12"  r="4"   fill="#C8973A"/>
  <circle cx="157" cy="51"  r="2.8" fill="#5C2D91" stroke="#C8973A" stroke-width="1"/>
  <circle cx="157" cy="129" r="3.2" fill="#C8973A" opacity="0.7"/>
  <circle cx="90"  cy="168" r="2.5" fill="#5C2D91" stroke="#C8973A" stroke-width="1"/>
  <circle cx="23"  cy="129" r="4"   fill="#C8973A"/>
  <circle cx="23"  cy="51"  r="2.5" fill="#5C2D91" stroke="#C8973A" stroke-width="1"/>

  <!-- Radial spokes -->
  <line x1="90" y1="86" x2="90"  y2="16"  stroke="#C8973A" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="86" x2="153" y2="53"  stroke="#C8973A" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="86" x2="153" y2="127" stroke="#C8973A" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="94" x2="90"  y2="164" stroke="#C8973A" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="94" x2="27"  y2="127" stroke="#C8973A" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="86" x2="27"  y2="53"  stroke="#C8973A" stroke-width="0.5" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="188" y="105" class="gv-main"><tspan fill="#C8973A">Graha</tspan><tspan fill="#2A0F52">Veda</tspan></text>

  <!-- Gold rule -->
  <rect x="188" y="114" width="400" height="1.5" rx="1" fill="#C8973A" opacity="0.55"/>

  <!-- Tagline -->
  <text x="190" y="136" class="gv-sub">ANCIENT WISDOM · COSMIC GUIDANCE</text>
</svg>
